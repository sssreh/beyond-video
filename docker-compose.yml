# Explicit version key on purpose: Synology's Container Manager only
# ships the old standalone docker-compose 1.x CLI over SSH (no
# `docker compose` v2 plugin) - without a version key, that CLI reads
# this file as the legacy Compose v1 format (top-level keys are
# service names directly, no `services:` wrapper), which would
# misread everything below as one oddly-named service. "3.8" is a
# Compose file format docker-compose 1.28.5 (Christer's version)
# understands and that supports everything used here.
version: "3.8"

services:
  bv-web:
    build: .
    container_name: beyond-video-web
    restart: unless-stopped
    ports:
      - "19373:19373"
    volumes:
      # The trip archive bv-export writes into (--target). Read-only:
      # this increment of bv-web only browses/plays existing trips,
      # it never writes here itself. Point bv-export --target at the
      # same host path (left of the colon) so newly exported trips
      # show up here too.
      - ./data/trips:/data/trips:ro
      # bv-web's accounts file (web-users.cfg) - read-write, and kept
      # outside the image so it survives `docker-compose build`/
      # container recreation. Created empty on first run; populate it
      # with `docker exec -it beyond-video-web bv-web adduser ...`
      # (see docs/DEPLOY.md).
      - ./data/config:/data/config

  # bv-download (fetch from the camera) and bv-config (one-time camera
  # setup) - see docs/DEPLOY.md's "Feeding it real trips" section.
  # bv-generate/bv-export deliberately do NOT run here - they run
  # natively on Christer's PC instead (GPU acceleration, already
  # proven to work there), reading data/archive and writing data/trips
  # over an SMB-mapped drive to this same NAS folder rather than
  # inside a container. Not a long-running service like bv-web: no
  # `restart:` policy and no fixed command here on purpose - invoke it
  # per command with `docker-compose run --rm bv-cli <command> ...`,
  # e.g. `docker-compose run --rm bv-cli bv-download Kirby`.
  bv-cli:
    build:
      context: .
      dockerfile: Dockerfile.cli
    volumes:
      # bv-download's target / bv-config's "Target (download path)" -
      # the raw camera archive. This is the SAME host folder Christer's
      # PC reaches over SMB to run bv-generate/bv-export against - see
      # docs/DEPLOY.md. Not shared with bv-web at all; bv-web only
      # ever reads finished trip folders, never raw recordings.
      - ./data/archive:/data/archive
      # Camera .cfg files (bv-config --config-dir) - deliberately a
      # different host folder than bv-web's ./data/config above (that
      # one holds web-users.cfg, an unrelated file); both happen to
      # land at /data/config inside their own separate containers,
      # which is fine since containers don't share a filesystem.
      - ./data/camera-config:/data/config
