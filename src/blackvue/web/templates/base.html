<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Beyond Video{% endblock %}</title>
  <style>
    :root { color-scheme: dark light; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem;
      background: #14161a;
      color: #e6e6e6;
      line-height: 1.5;
    }
    a { color: #7cb7ff; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid #2a2d33;
      padding-bottom: 0.75rem;
      margin-bottom: 1.5rem;
    }
    header h1 { font-size: 1.25rem; margin: 0; }
    header h1 a { color: inherit; text-decoration: none; }
    .user-bar { font-size: 0.9rem; color: #9aa0aa; }
    .user-bar form { display: inline; }
    .user-bar button {
      background: none; border: none; color: #7cb7ff; cursor: pointer;
      font: inherit; padding: 0;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #2a2d33; }
    th { color: #9aa0aa; font-weight: 600; font-size: 0.85rem; }
    .badge {
      display: inline-block; font-size: 0.75rem; padding: 0.1rem 0.5rem;
      border-radius: 1rem; background: #2a2d33; color: #9aa0aa; margin-left: 0.35rem;
    }
    video { width: 100%; max-height: 70vh; background: #000; border-radius: 6px; }
    .asset-list { list-style: none; padding: 0; margin: 1rem 0; }
    .asset-list li { padding: 0.35rem 0; }
    .empty { color: #9aa0aa; padding: 2rem 0; }
    .error { color: #ff8080; margin-bottom: 1rem; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 0.5rem; margin: 0.35rem 0 1rem;
      background: #1c1f24; border: 1px solid #2a2d33; color: inherit; border-radius: 4px;
      box-sizing: border-box;
    }
    button[type="submit"] {
      background: #2f6fed; color: white; border: none; padding: 0.55rem 1.25rem;
      border-radius: 4px; font: inherit; cursor: pointer;
    }
    .login-box { max-width: 320px; margin: 3rem auto; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">Beyond Video</a></h1>
    {% if user %}
    <div class="user-bar">
      {{ user.username }} <span class="badge">{{ user.role }}</span>
      &middot;
      <form method="post" action="/logout"><button type="submit">Log out</button></form>
    </div>
    {% endif %}
  </header>
  {% block content %}{% endblock %}
</body>
</html>
